<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0b1220">
  <title>Sign In - Senior Care Assistant</title>
  <link rel="manifest" href="/manifest.json">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="flex items-center justify-center min-h-dvh page-with-nav">

  <div class="w-full max-w-md px-6 py-10">
    <div class="text-center mb-10">
      <div class="text-5xl mb-4">&#x1F3E5;</div>
      <h1 class="text-3xl font-bold text-sky-400">Senior Care Assistant</h1>
      <p class="text-slate-400 mt-2 text-lg">Improving Daily Life &amp; Medication Adherence</p>
    </div>

    <div class="bg-slate-800 rounded-2xl p-8 border border-slate-700">
      <h2 class="text-xl font-bold mb-2">Sign In</h2>
      <p class="text-slate-400 mb-6">Enter your email. We'll send you a magic link — no password needed.</p>

      <form id="login-form">
        <label class="block text-sm font-semibold text-slate-300 mb-2" for="email">Email address</label>
        <input id="email" type="email" required placeholder="you@example.com"
               class="input-lg mb-4" autocomplete="email">
        <button id="login-btn" type="submit" class="btn-primary">Send Magic Link</button>
      </form>

      <p id="login-message" class="mt-4 text-center text-slate-400"></p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module">
    import { initLoginPage } from "/js/auth.js";
    initLoginPage();
  </script>
</body>
</html>
