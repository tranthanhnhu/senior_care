<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0b1220">
  <title>Contacts - Senior Care</title>
  <link rel="manifest" href="/manifest.json">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="page-with-nav">

  <header class="px-4 py-4 bg-slate-900 border-b border-slate-700">
    <h1 class="text-2xl font-bold text-sky-400">&#x1F4DE; Contacts</h1>
    <p class="text-slate-400 text-sm mt-1">Tap Call to dial on your phone</p>
  </header>

  <main class="px-4 py-4 max-w-lg mx-auto">
    <button id="emergency-btn" class="btn-danger mb-6">&#x1F6A8; Emergency Call</button>

    <div id="contact-list"></div>

    <div class="mt-6 bg-slate-800 rounded-2xl p-5 border border-slate-700">
      <h2 class="font-bold text-lg mb-4">Add Contact</h2>
      <form id="add-form" class="space-y-3">
        <input id="contact-name" type="text" required placeholder="Name (e.g. daughter)" class="input-lg">
        <input id="contact-phone" type="tel" required placeholder="Phone (e.g. +84 901 234 567)" class="input-lg">
        <button type="submit" class="btn-primary">+ Add Contact</button>
      </form>
    </div>
  </main>

  <nav class="bottom-nav">
    <a href="/" class="nav-item"><span class="icon">&#x1F3E0;</span>Home</a>
    <a href="/medications" class="nav-item"><span class="icon">&#x1F48A;</span>Meds</a>
    <a href="/contacts" class="nav-item active"><span class="icon">&#x1F4DE;</span>Contacts</a>
    <a href="#" id="nav-logout" class="nav-item"><span class="icon">&#x1F6AA;</span>Logout</a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="/js/contacts.js"></script>
  <script type="module">
    import { logout } from "/js/auth.js";
    document.getElementById("nav-logout")?.addEventListener("click", (e) => {
      e.preventDefault(); logout();
    });
  </script>
</body>
</html>
