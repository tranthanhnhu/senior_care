<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0b1220">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Senior Care Assistant</title>
  <link rel="manifest" href="/manifest.json">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="flex flex-col h-dvh page-with-nav">

  <!-- Header -->
  <header class="flex items-center justify-between px-4 py-3 bg-slate-900 border-b border-slate-700 shrink-0">
    <div>
      <h1 class="text-xl font-bold text-sky-400">Senior Care</h1>
      <p class="text-xs text-slate-400">Voice Assistant</p>
    </div>
    <div class="text-right">
      <div id="clock" class="text-sm font-semibold text-slate-200"></div>
      <div id="user-email" class="text-xs text-slate-400 capitalize"></div>
    </div>
  </header>

  <!-- Status -->
  <div class="px-4 py-2 shrink-0">
    <span id="status-pill" class="status-pill">Ready</span>
  </div>

  <!-- Chat area -->
  <div id="chat-area" class="chat-scroll flex-1"></div>

  <!-- Speak + Quick actions -->
  <div class="px-4 py-3 bg-slate-900 border-t border-slate-700 shrink-0">
    <div class="flex flex-col items-center gap-3 mb-3">
      <p class="text-sm text-slate-400">Hold to Speak</p>
      <button id="speak-btn" class="speak-btn" aria-label="Hold to speak">&#x1F3A4;</button>
    </div>
    <div class="grid grid-cols-2 gap-2 mb-3">
      <button id="quick-meds" class="quick-btn bg-blue-700 text-white">&#x1F48A; Medicine</button>
      <button id="quick-call" class="quick-btn bg-purple-700 text-white">&#x1F4DE; Contacts</button>
      <button id="quick-time" class="quick-btn bg-cyan-700 text-white">&#x23F0; Time</button>
      <button id="quick-help" class="quick-btn bg-amber-700 text-white">&#x2753; Help</button>
    </div>
    <div class="flex gap-2">
      <input id="text-input" type="text" placeholder="Type a message..."
             class="input-lg flex-1" autocomplete="off">
      <button id="send-btn" class="quick-btn bg-sky-500 text-slate-900 px-5">Send</button>
    </div>
  </div>

  <!-- Bottom nav -->
  <nav class="bottom-nav">
    <a href="/" class="nav-item active"><span class="icon">&#x1F3E0;</span>Home</a>
    <a href="/medications" class="nav-item"><span class="icon">&#x1F48A;</span>Meds</a>
    <a href="/contacts" class="nav-item"><span class="icon">&#x1F4DE;</span>Contacts</a>
    <a href="#" id="nav-logout" class="nav-item"><span class="icon">&#x1F6AA;</span>Logout</a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
