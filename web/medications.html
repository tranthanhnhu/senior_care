<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0b1220">
  <title>My Medications - Senior Care</title>
  <link rel="manifest" href="/manifest.json">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="page-with-nav">

  <header class="px-4 py-4 bg-slate-900 border-b border-slate-700">
    <h1 class="text-2xl font-bold text-sky-400">&#x1F48A; My Medications</h1>
    <p class="text-slate-400 text-sm mt-1">Your daily medicine schedule</p>
  </header>

  <main class="px-4 py-4 max-w-lg mx-auto">
    <div id="med-list"></div>

    <div class="mt-6 bg-slate-800 rounded-2xl p-5 border border-slate-700">
      <h2 class="font-bold text-lg mb-4">Add Medicine</h2>
      <form id="add-form" class="space-y-3">
        <input id="med-name" type="text" required placeholder="Medicine name" class="input-lg">
        <input id="med-time" type="text" required placeholder="Time (HH:MM e.g. 08:00)" class="input-lg"
               pattern="([01]?[0-9]|2[0-3]):[0-5][0-9]">
        <input id="med-dose" type="text" placeholder="Dose (e.g. 1 tablet)" class="input-lg">
        <button type="submit" class="btn-primary">+ Add Medicine</button>
      </form>
    </div>
  </main>

  <nav class="bottom-nav">
    <a href="/" class="nav-item"><span class="icon">&#x1F3E0;</span>Home</a>
    <a href="/medications" class="nav-item active"><span class="icon">&#x1F48A;</span>Meds</a>
    <a href="/contacts" class="nav-item"><span class="icon">&#x1F4DE;</span>Contacts</a>
    <a href="#" id="nav-logout" class="nav-item"><span class="icon">&#x1F6AA;</span>Logout</a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="/js/medications.js"></script>
  <script type="module">
    import { logout } from "/js/auth.js";
    document.getElementById("nav-logout")?.addEventListener("click", (e) => {
      e.preventDefault(); logout();
    });
  </script>
</body>
</html>
